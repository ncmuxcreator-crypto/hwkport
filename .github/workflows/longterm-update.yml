name: Longterm Update

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "data/**"
      - "dashboard/api/**"
      - "public/**"
  schedule:
    - cron: "0 */6 * * *"

concurrency:
  group: hwk-longterm-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: write

    env:
      CI: true
      NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"
      NPM_CONFIG_PROGRESS: "false"
      NPM_CONFIG_LEGACY_PEER_DEPS: "true"
      UPDATE_MODE: scheduled
      UPDATE_TIMEOUT_MS: 600000
      SOURCE_TIMEOUT_MS: 25000
      MAX_OUTPUT_ROWS: 1000
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      VESSEL_SPEC_SERVICE_KEY: ${{ secrets.VESSEL_SPEC_SERVICE_KEY }}
      VESSEL_SPEC_API_URL: ${{ secrets.VESSEL_SPEC_API_URL }}
      PILOT_SOURCE_URLS: ${{ secrets.PILOT_SOURCE_URLS }}
      BERTH_SOURCE_URLS: ${{ secrets.BERTH_SOURCE_URLS }}
      PORT_FACILITY_SERVICE_KEY: ${{ secrets.PORT_FACILITY_SERVICE_KEY }}
      PORT_FACILITY_API_URL: ${{ secrets.PORT_FACILITY_API_URL }}
      PORT_OPERATION_SERVICE_KEY: ${{ secrets.PORT_OPERATION_SERVICE_KEY }}
      PORT_OPERATION_API_URL: ${{ secrets.PORT_OPERATION_API_URL }}
      ULSAN_API_URL: ${{ secrets.ULSAN_API_URL }}
      ULSAN_API_KEY: ${{ secrets.ULSAN_API_KEY }}
      ULSAN_BERTH_DETAIL_API_URL: ${{ secrets.ULSAN_BERTH_DETAIL_API_URL }}
      ULSAN_CARGO_PLAN_API_URL: ${{ secrets.ULSAN_CARGO_PLAN_API_URL }}
      ULSAN_BERTH_OPERATION_API_URL: ${{ secrets.ULSAN_BERTH_OPERATION_API_URL }}
      ULSAN_TERMINAL_PROCESS_API_URL: ${{ secrets.ULSAN_TERMINAL_PROCESS_API_URL }}
      ULSAN_BERTH_DETAIL_API_KEY: ${{ secrets.ULSAN_BERTH_DETAIL_API_KEY }}
      ULSAN_CARGO_PLAN_API_KEY: ${{ secrets.ULSAN_CARGO_PLAN_API_KEY }}
      ULSAN_BERTH_OPERATION_API_KEY: ${{ secrets.ULSAN_BERTH_OPERATION_API_KEY }}
      ULSAN_TERMINAL_PROCESS_API_KEY: ${{ secrets.ULSAN_TERMINAL_PROCESS_API_KEY }}
      MOF_VTS_API_BASE: ${{ secrets.MOF_VTS_API_BASE }}
      MOF_VTS_SERVICE_KEY: ${{ secrets.MOF_VTS_SERVICE_KEY }}
      MOF_VTS_PORT_CODES: ${{ secrets.MOF_VTS_PORT_CODES }}
      MOF_AIS_DYNAMIC_API_URL: ${{ secrets.MOF_AIS_DYNAMIC_API_URL }}
      MOF_AIS_DYNAMIC_SERVICE_KEY: ${{ secrets.MOF_AIS_DYNAMIC_SERVICE_KEY }}
      MOF_AIS_DYNAMIC_PER_PAGE: ${{ secrets.MOF_AIS_DYNAMIC_PER_PAGE }}
      MOF_AIS_INFO_API_URL: ${{ secrets.MOF_AIS_INFO_API_URL }}
      MOF_AIS_INFO_SERVICE_KEY: ${{ secrets.MOF_AIS_INFO_SERVICE_KEY }}
      MOF_AIS_INFO_PER_PAGE: ${{ secrets.MOF_AIS_INFO_PER_PAGE }}
      MOF_AIS_STAT_API_URL: ${{ secrets.MOF_AIS_STAT_API_URL }}
      MOF_AIS_STAT_SERVICE_KEY: ${{ secrets.MOF_AIS_STAT_SERVICE_KEY }}
      MOF_AIS_STAT_PER_PAGE: ${{ secrets.MOF_AIS_STAT_PER_PAGE }}
      GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
      GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
      PNC_SOURCE_URLS: ${{ secrets.PNC_SOURCE_URLS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Reset npm registry
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm config set audit false
          npm config set fund false
          npm config set progress false
          npm config get registry

      - name: Install dependencies (npm safe path)
        timeout-minutes: 30
        run: |
          npm ci --legacy-peer-deps --no-audit --no-fund --progress=false --registry=https://registry.npmjs.org/ || npm install --legacy-peer-deps --no-audit --no-fund --progress=false --registry=https://registry.npmjs.org/

      - name: Collect public port data and build dashboard
        timeout-minutes: 12
        run: |
          echo "Starting HWK public-data collection pipeline"
          echo "Collectors are executed inside scripts/update.js -> collectKoreaData()"
          npm run update

      - name: Print collector diagnostics
        if: always()
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const path = "dashboard/api/status.json";
          if (!fs.existsSync(path)) {
            console.log("status.json was not generated.");
            process.exit(0);
          }
          const status = JSON.parse(fs.readFileSync(path, "utf8"));
          const diag = status.collector_diagnostics || {};
          console.log("=== HWK Collector Diagnostics ===");
          console.log(`data_mode=${status.data_mode}`);
          console.log(`records=${status.record_count}`);
          console.log(`attempted=${diag.attempted_count || 0}`);
          console.log(`success=${diag.success_count || 0}`);
          console.log(`failed=${diag.failed_count || 0}`);
          console.log(`skipped=${diag.skipped_count || 0}`);
          console.log(`real_rows=${diag.real_row_count || 0}`);
          console.log(`fallback_used=${Boolean(diag.fallback_used)}`);
          for (const source of diag.sources || []) {
            const state = source.success ? "success" : source.skipped ? `skipped:${source.reason || "unknown"}` : source.error ? `failed:${source.error}` : "pending";
            console.log(`${source.key}: ${state}; rows=${source.row_count || 0}; normalized=${source.normalized_count || 0}`);
          }
          console.log("storage.supabase=", status.storage_status?.supabase?.status || status.supabase_write?.status || "unknown");
          console.log("storage.gdrive=", status.storage_status?.gdrive?.status || status.gdrive_archive?.status || "unknown");
          NODE

      - name: Validate output
        timeout-minutes: 2
        run: npm run validate

      - name: Run health audit
        timeout-minutes: 7
        run: npm run health

      - name: Upload generated snapshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hwk-generated-snapshot
          retention-days: 14
          path: |
            data/latest-lite.json
            data/pipeline-report.json
            data/reports/
            data/history/
            dashboard/api/
            public/
